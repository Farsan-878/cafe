{% extends "base.html" %}

{% block title %}Edit Staff - Cafe Management{% endblock %}

{% block content %}
<section class="form-section">
    <div class="form-container">
        <h2>Edit Staff Member</h2>
        <form method="POST" class="item-form">
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" value="{{ staff_member.name }}" placeholder="Enter staff name" required>
            </div>

            <div class="form-group">
                <label for="position">Position</label>
                <select id="position" name="position" required>
                    <option value="">Select position</option>
                    {% for pos in positions %}
                        <option value="{{ pos }}" {% if staff_member.position == pos %}selected{% endif %}>{{ pos }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label for="phone">Phone Number</label>
                <input type="tel" id="phone" name="phone" value="{{ staff_member.phone }}" placeholder="10-15 digits" required>
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" value="{{ staff_member.email }}" placeholder="staff@cafe.com" required>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Update Staff Member</button>
                <a href="{{ url_for('staff_list') }}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</section>
{% endblock %}
