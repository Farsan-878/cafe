{% extends "base.html" %}

{% block title %}Edit Item - Cafe Management{% endblock %}

{% block content %}
<section class="form-section">
    <div class="section-header">
        <h2>Edit Item</h2>
        <p class="section-description">Update cafe menu item details</p>
    </div>

    <div class="form-container">
        <form method="POST" class="item-form">
            <div class="form-group">
                <label for="name">Item Name *</label>
                <input
                    type="text"
                    id="name"
                    name="name"
                    placeholder="e.g., Cappuccino, Sandwich, Smoothie"
                    value="{{ item.name }}"
                    required
                    autofocus
                >
            </div>

            <div class="form-group">
                <label for="price">Price (in ₹) *</label>
                <input
                    type="number"
                    id="price"
                    name="price"
                    placeholder="e.g., 150"
                    value="{{ item.price }}"
                    min="1"
                    required
                >
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Update Item</button>
                <a href="{{ url_for('index') }}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</section>
{% endblock %}
